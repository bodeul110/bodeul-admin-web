name: Admin Web Preview Deploy

on:
  workflow_dispatch:
    inputs:
      channel_id:
        description: "Firebase Hosting preview channel id"
        required: false
        default: "admin-web-preview"
      expires:
        description: "Preview channel expiration, max 30d"
        required: false
        default: "7d"

permissions:
  contents: read
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ inputs.channel_id }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    name: deploy-preview
    runs-on: ubuntu-latest
    environment: admin-web-preview
    timeout-minutes: 20
    env:
      FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID }}
      VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
      VITE_FIREBASE_AUTH_DOMAIN: ${{ vars.VITE_FIREBASE_AUTH_DOMAIN }}
      VITE_FIREBASE_PROJECT_ID: ${{ vars.VITE_FIREBASE_PROJECT_ID }}
      VITE_FIREBASE_STORAGE_BUCKET: ${{ vars.VITE_FIREBASE_STORAGE_BUCKET }}
      VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
      VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
      VITE_FIREBASE_APPCHECK_SITE_KEY: ${{ secrets.VITE_FIREBASE_APPCHECK_SITE_KEY }}
      VITE_BODEUL_DATA_BACKEND: ${{ vars.VITE_BODEUL_DATA_BACKEND || 'firebase' }}
      VITE_BODEUL_API_BASE_URL: ${{ vars.VITE_BODEUL_API_BASE_URL || 'http://127.0.0.1:8080' }}
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test server contract
        run: npm run test

      # Firebase Hosting은 Next.js 이전 중 문제가 생겼을 때 사용할 정적 rollback 경로다.
      - name: Build Vite rollback
        run: npm run build:vite

      - name: Check WIF configuration
        env:
          ADMIN_WEB_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.ADMIN_WEB_WORKLOAD_IDENTITY_PROVIDER }}
          ADMIN_WEB_DEPLOY_SERVICE_ACCOUNT: ${{ vars.ADMIN_WEB_DEPLOY_SERVICE_ACCOUNT }}
        run: |
          set -euo pipefail

          if [[ -z "${ADMIN_WEB_WORKLOAD_IDENTITY_PROVIDER}" ]]; then
            echo "ADMIN_WEB_WORKLOAD_IDENTITY_PROVIDER variable이 비어 있습니다." >&2
            exit 1
          fi

          if [[ -z "${ADMIN_WEB_DEPLOY_SERVICE_ACCOUNT}" ]]; then
            echo "ADMIN_WEB_DEPLOY_SERVICE_ACCOUNT variable이 비어 있습니다." >&2
            exit 1
          fi

      - name: Authenticate to Google Cloud
        id: gcp-auth
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ vars.FIREBASE_PROJECT_ID }}
          workload_identity_provider: ${{ vars.ADMIN_WEB_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.ADMIN_WEB_DEPLOY_SERVICE_ACCOUNT }}
          create_credentials_file: true
          export_environment_variables: true
          token_format: access_token
          access_token_scopes: https://www.googleapis.com/auth/cloud-platform

      - name: Deploy Firebase Hosting preview
        env:
          ADMIN_WEB_GCP_ACCESS_TOKEN: ${{ steps.gcp-auth.outputs.access_token }}
          CHANNEL_ID: ${{ inputs.channel_id || vars.FIREBASE_HOSTING_CHANNEL || 'admin-web-preview' }}
          EXPIRES: ${{ inputs.expires || vars.FIREBASE_HOSTING_EXPIRES || '7d' }}
        run: |
          set -euo pipefail

          if [[ -z "${FIREBASE_PROJECT_ID}" ]]; then
            echo "FIREBASE_PROJECT_ID가 비어 있습니다." >&2
            exit 1
          fi

          if [[ -z "${ADMIN_WEB_GCP_ACCESS_TOKEN}" ]]; then
            echo "Workload Identity access token이 비어 있습니다." >&2
            exit 1
          fi

          export FIREBASE_TOKEN="${ADMIN_WEB_GCP_ACCESS_TOKEN}"
          echo "Workload Identity access token 인증을 사용합니다."

          set +e
          npx --yes firebase-tools@15.22.3 hosting:channel:deploy "${CHANNEL_ID}" \
            --project "${FIREBASE_PROJECT_ID}" \
            --expires "${EXPIRES}" \
            --json | tee firebase-preview-deploy.json
          deploy_status="${PIPESTATUS[0]}"
          set -e

          if [[ "${deploy_status}" -ne 0 ]]; then
            if grep -q "current active version" firebase-preview-deploy.json; then
              echo "같은 산출물이 이미 preview channel의 현재 active version이므로 성공으로 처리합니다."
            else
              exit "${deploy_status}"
            fi
          fi

      - name: Summarize preview deployment
        env:
          AUTH_MODE: Workload Identity
          CHANNEL_ID: ${{ inputs.channel_id || vars.FIREBASE_HOSTING_CHANNEL || 'admin-web-preview' }}
          EXPIRES: ${{ inputs.expires || vars.FIREBASE_HOSTING_EXPIRES || '7d' }}
        run: |
          node <<'NODE'
          const fs = require('fs')

          const rawOutput = fs.existsSync('firebase-preview-deploy.json')
            ? fs.readFileSync('firebase-preview-deploy.json', 'utf8')
            : ''
          const urls = Array.from(new Set(rawOutput.match(/https:\/\/[^\s"'<>]+/g) || []))
          const summaryPath = process.env.GITHUB_STEP_SUMMARY
          const lines = [
            '## 관리자 웹 Preview 배포',
            '',
            `- Firebase project: ${process.env.FIREBASE_PROJECT_ID || ''}`,
            `- Channel: ${process.env.CHANNEL_ID || ''}`,
            `- Expires: ${process.env.EXPIRES || ''}`,
            `- Auth mode: ${process.env.AUTH_MODE || ''}`,
            '',
          ]

          if (rawOutput.includes('current active version')) {
            lines.push('동일 산출물이 이미 현재 active version이라 no-op 배포로 처리했습니다.', '')
          }

          if (urls.length) {
            lines.push('### URLs', '')
            for (const url of urls) {
              lines.push(`- ${url}`)
            }
          } else {
            lines.push('배포 URL을 자동 추출하지 못했습니다. Firebase deploy 로그를 확인해 주세요.')
          }

          fs.appendFileSync(summaryPath, `${lines.join('\n')}\n`)
          NODE
